<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Convivencia Escolar — INTI</title>
<style>
:root{--az:#003876;--azl:#1565C0;--azp:#DDEEFF;--ver:#1B5E20;--blanco:#fff;--gris:#37474F;--err:#C62828;}
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:linear-gradient(135deg,#003876 0%,#1565C0 60%,#0288d1 100%);
     display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',Arial,sans-serif;padding:16px;}
.card{background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.3);
      padding:40px 36px;width:100%;max-width:400px;}
.logo{text-align:center;margin-bottom:28px;}
.logo .escudo{font-size:48px;line-height:1;}
.logo h1{color:var(--az);font-size:1.3rem;font-weight:700;margin-top:8px;line-height:1.2;}
.logo p{color:var(--gris);font-size:.8rem;margin-top:4px;}
.badge{display:inline-block;background:var(--azp);color:var(--az);font-size:.72rem;
       font-weight:600;padding:3px 10px;border-radius:20px;margin-top:6px;}
label{display:block;font-size:.83rem;font-weight:600;color:var(--gris);margin-bottom:5px;}
input{width:100%;padding:11px 14px;border:2px solid #cfd8dc;border-radius:8px;
      font-size:1rem;transition:border .2s;outline:none;background:#f9fafb;}
input:focus{border-color:var(--azl);background:#fff;}
.group{margin-bottom:18px;}
.btn{width:100%;padding:13px;background:var(--az);color:#fff;border:none;
     border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;
     transition:background .2s;letter-spacing:.5px;}
.btn:hover{background:var(--azl);}
.btn:active{background:#002060;}
.err{background:#ffebee;color:var(--err);border:1px solid #ffcdd2;border-radius:8px;
     padding:10px 14px;font-size:.85rem;margin-bottom:14px;display:none;}
.note{text-align:center;font-size:.75rem;color:#90a4ae;margin-top:18px;}
@media(max-width:480px){.card{padding:28px 20px;}}
</style>
</head>

         style="width:90px;height:90px;object-fit:contain;border-radius:50%;
                box-shadow:0 4px 16px rgba(0,56,118,.25);margin-bottom:10px;">
    <h1>Sistema de Gestión de<br>Convivencia Escolar</h1>
    <p style="font-weight:600;color:var(--az);font-size:.85rem;margin-top:4px">I.N.T.I.</p>
    <p>Memorándum N.° 06-2025</p>
    <span class="badge">Instituto Nacional Técnico Industrial</span>
  </div>
  <div class="err" id="errMsg"></div>
  <div class="group">
    <label for="correo">Correo institucional</label>
    <input type="email" id="correo" placeholder="usuario@clases.edu.sv" autocomplete="username">
  </div>
  <div class="group">
    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="btnLogin" onclick="doLogin()">INGRESAR AL SISTEMA</button>
  <p class="note">Solo correos institucionales @clases.edu.sv</p>
</div>
<script>
function doLogin(){
  const btn=document.getElementById('btnLogin');
  const err=document.getElementById('errMsg');
  const correo=document.getElementById('correo').value.trim();
  const password=document.getElementById('password').value.trim();
  err.style.display='none';
  if(!correo||!password){err.textContent='Complete todos los campos.';err.style.display='block';return;}
  btn.textContent='Verificando...';btn.disabled=true;
  fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({correo,password})})
  .then(r=>r.json().then(d=>({ok:r.ok,d})))
  .then(({ok,d})=>{
    if(d.ok){window.location='/';}
    else{err.textContent=d.error||'Error desconocido.';err.style.display='block';btn.textContent='INGRESAR AL SISTEMA';btn.disabled=false;}
  }).catch(()=>{err.textContent='Error de conexión.';err.style.display='block';btn.textContent='INGRESAR AL SISTEMA';btn.disabled=false;});
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
